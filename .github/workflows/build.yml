name: build-and-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          make check
          make benchmark
          ./benchmark

      # Apple's clang doesn't accept -march=native on arm64 and doesn't bundle
      # OpenMP, so override CFLAGS/LDFLAGS and skip benchmark.
      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: make check CFLAGS="-Wall -O2 -fomit-frame-pointer" LDFLAGS=""

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          .\build.ps1 -Target check
          .\build.ps1 -Target benchmark
